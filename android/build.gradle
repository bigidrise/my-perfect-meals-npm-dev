// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Fix: org.apache.cordova:framework:10.1.1 (pulled by capacitor-cordova-android-plugins)
    // drags in kotlin-stdlib-jdk7:1.6.21 and kotlin-stdlib-jdk8:1.6.21 transitively.
    // Since Kotlin 1.8.0 these artifacts were merged into the main kotlin-stdlib.
    // Hard-exclude the old jdk7/jdk8 jars so they are never added to the classpath.
    configurations.all {
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
        exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

// Force Java 17 and Kotlin JVM target 17 across all subprojects
// (overrides Capacitor 7's VERSION_21 default and any plugin-level Kotlin mismatches)
subprojects {
    afterEvaluate { project ->
        def androidExt = project.extensions.findByName('android')
        if (androidExt != null) {
            androidExt.compileOptions.sourceCompatibility = JavaVersion.VERSION_17
            androidExt.compileOptions.targetCompatibility = JavaVersion.VERSION_17
        }

        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
            }
        }
    }
}
